name: GitHub Action CI Pipeline

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

jobs:
    test:
        name: Run Tests
        runs-on: ubuntu:latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
            
            - name: Setup Node.jobs
              uses: actions/setup-node@v4
              with: 
                node-version: 20.x
                cache: npm
            
            - name: Install Dependencies
              run: npm ci 
            
            - name: Run Tests
              run: npm test