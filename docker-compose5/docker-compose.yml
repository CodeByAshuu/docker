services:

  app:
    build: ./app

    container_name: springboot-app

    ports:
      - "8080:8080"

    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgresdb:5432/studentdb
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres123

    depends_on:
      - postgresdb

    networks:
      - spring-network

  postgresdb:
    image: postgres:17

    container_name: postgresdb

    environment:
      POSTGRES_DB: studentdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123

    volumes:
      - postgres_data:/var/lib/postgresql/data

    networks:
      - spring-network

volumes:
  postgres_data:

networks:
  spring-network: